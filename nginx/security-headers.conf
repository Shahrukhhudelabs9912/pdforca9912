# Shared security headers — included in every location block that has
# its own add_header directives (nginx suppresses parent-level add_header
# in nested blocks that define their own, so this must be explicit).
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://*.googlesyndication.com https://static.cloudflareinsights.com https://*.google.com https://*.doubleclick.net https://*.adtrafficquality.google; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://*.google-analytics.com https://*.googlesyndication.com https://static.cloudflareinsights.com https://*.adtrafficquality.google https://*.google.com https://*.doubleclick.net; frame-src 'self' https://*.doubleclick.net https://*.googlesyndication.com https://*.google.com https://*.adtrafficquality.google;" always;
