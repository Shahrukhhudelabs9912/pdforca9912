<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Aliases for Microsoft Office fonts that ship with NO metric-compatible
  package on Debian. Without these, fontconfig falls back by PANOSE
  classification, which misfires badly for the newer Office defaults.

  Aptos is the case that motivated this file. It became Office's default
  font in 2024 (replacing Calibri). It is a humanist sans-serif, but its
  PANOSE first byte is 0x02 ("Latin Text"), so bare fontconfig matches it
  to a SERIF face (Noto Serif / Bodoni MT Black on some hosts) — visually
  nothing like the original and it reflows the whole document.

  Mapping Aptos -> Liberation Sans mirrors what cloud converters do
  (iLovePDF substitutes Arial); Liberation Sans is Arial metric-compatible,
  so line breaks and page counts line up with the Word original.
-->
<fontconfig>
  <!-- Aptos family (body) -> Liberation Sans (Arial-compatible) -->
  <match target="pattern">
    <test name="family"><string>Aptos</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Liberation Sans</string></edit>
  </match>

  <!-- Aptos Display (headings) -> Liberation Sans -->
  <match target="pattern">
    <test name="family"><string>Aptos Display</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Liberation Sans</string></edit>
  </match>

  <!-- Aptos Serif -> Liberation Serif (Times New Roman-compatible) -->
  <match target="pattern">
    <test name="family"><string>Aptos Serif</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Liberation Serif</string></edit>
  </match>

  <!-- Aptos Mono -> Liberation Mono (Courier New-compatible) -->
  <match target="pattern">
    <test name="family"><string>Aptos Mono</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Liberation Mono</string></edit>
  </match>
</fontconfig>
